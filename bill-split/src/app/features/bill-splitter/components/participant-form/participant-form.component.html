<section id="participants" class="module-spacing">
  <div class="card h-100">
    <div class="card-body">
      <h2 class="h6 text-uppercase text-muted fw-bold mb-3 tracking-wider">
        <i class="fa-solid fa-users me-2"></i>Group Members
      </h2>

      <!-- Input Form -->
      <form aria-label="Add Participant Form">
        <div class="input-group mb-3 shadow-sm rounded-3">
          <div class="form-floating">
            <input type="text" class="form-control border-end-0" id="participantName" placeholder="Name">
            <label for="participantName" class="text-muted">Add person...</label>
          </div>
          <button class="btn btn-outline-secondary border-start-0 border text-primary bg-white transition-all px-4" type="button" aria-label="Add Participant">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
      </form>
      <!-- Output List -->
      <app-participant-list></app-participant-list>
    </div>
  </div>
</section>
