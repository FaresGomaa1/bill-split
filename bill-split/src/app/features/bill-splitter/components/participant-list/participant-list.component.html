<div class="card-body">

  <div class="card-body">

    <div class="d-flex flex-wrap gap-2">

      <span class="badge-participant"
            *ngFor="let participant of participantList">

        <i class="fa-solid fa-user text-primary opacity-75"></i>

        {{ participant.name }}

        <button class="btn-close ms-2"
                (click) ="removeParticipant(participant)"
                style="font-size:.55rem">
        </button>

      </span>

    </div>

  </div>

    </div>
